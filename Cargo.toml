[package]
name = "harbor"
version = "0.1.0"
edition = "2024"

[dependencies]
# error handle
anyhow = "1.0"
thiserror = "2.0"

# sync
parking_lot = "0.12"

# windows deps
wgpu = "29.0"
winit = "0.30"
pollster = "0.4"

# logger
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt"] }

# vertex casting
bytemuck = { version = "1.21", features = ["derive"] }

# system font rasterization
fontdb = "0.23"
fontdue = "0.9"
